# Full local stack; Jaeger is opt-in via the `tracing` profile.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow
      POSTGRES_DB: ticketflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow -d ticketflow"]
      interval: 2s
      timeout: 5s
      retries: 30

  runner:
    build: .
    command: python -m ticketflow.runner
    environment:
      DATABASE_URL: postgresql://ticketflow:ticketflow@postgres:5432/ticketflow
      TICKETFLOW_DB_POOL_MAX_SIZE: ${TICKETFLOW_DB_POOL_MAX_SIZE:-10}
      AGENT_SCHEDULE_TO_START_S: ${AGENT_SCHEDULE_TO_START_S:-30}
      TICKETFLOW_TRACE_EXPORTER: ${TICKETFLOW_TRACE_EXPORTER:-none}
      TICKETFLOW_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      TICKETFLOW_LANGSMITH_TRACING: ${TICKETFLOW_LANGSMITH_TRACING:-false}
      LANGSMITH_TRACING_V2: "${LANGSMITH_TRACING_V2:-false}"
      LANGCHAIN_TRACING_V2: "${LANGCHAIN_TRACING_V2:-false}"
      LANGCHAIN_TRACING: "${LANGCHAIN_TRACING:-}"
      LANGCHAIN_HANDLER: "${LANGCHAIN_HANDLER:-}"
    depends_on:
      postgres:
        condition: service_healthy

  agent_worker:
    build: .
    command: python -m ticketflow.agent_worker
    environment:
      DATABASE_URL: postgresql://ticketflow:ticketflow@postgres:5432/ticketflow
      AGENT_MAX_PER_SECOND: ${AGENT_MAX_PER_SECOND:-10.0}
      AGENT_MAX_CONCURRENT: ${AGENT_MAX_CONCURRENT:-20}
      TICKETFLOW_DB_POOL_MAX_SIZE: ${TICKETFLOW_DB_POOL_MAX_SIZE:-10}
      AGENT_SCHEDULE_TO_START_S: ${AGENT_SCHEDULE_TO_START_S:-30}
      TICKETFLOW_TRACE_EXPORTER: ${TICKETFLOW_TRACE_EXPORTER:-none}
      TICKETFLOW_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      TICKETFLOW_LANGSMITH_TRACING: ${TICKETFLOW_LANGSMITH_TRACING:-false}
      LANGSMITH_TRACING_V2: "${LANGSMITH_TRACING_V2:-false}"
      LANGCHAIN_TRACING_V2: "${LANGCHAIN_TRACING_V2:-false}"
      LANGCHAIN_TRACING: "${LANGCHAIN_TRACING:-}"
      LANGCHAIN_HANDLER: "${LANGCHAIN_HANDLER:-}"
    depends_on:
      postgres:
        condition: service_healthy

  fallback-worker:
    build: .
    command: python -m ticketflow.fallback_worker
    environment:
      DATABASE_URL: postgresql://ticketflow:ticketflow@postgres:5432/ticketflow
      AGENT_MAX_CONCURRENT: ${AGENT_MAX_CONCURRENT:-20}
      TICKETFLOW_DB_POOL_MAX_SIZE: ${TICKETFLOW_DB_POOL_MAX_SIZE:-10}
      AGENT_SCHEDULE_TO_START_S: ${AGENT_SCHEDULE_TO_START_S:-30}
      TICKETFLOW_TRACE_EXPORTER: ${TICKETFLOW_TRACE_EXPORTER:-none}
      TICKETFLOW_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      TICKETFLOW_LANGSMITH_TRACING: ${TICKETFLOW_LANGSMITH_TRACING:-false}
      LANGSMITH_TRACING_V2: "${LANGSMITH_TRACING_V2:-false}"
      LANGCHAIN_TRACING_V2: "${LANGCHAIN_TRACING_V2:-false}"
      LANGCHAIN_TRACING: "${LANGCHAIN_TRACING:-}"
      LANGCHAIN_HANDLER: "${LANGCHAIN_HANDLER:-}"
    depends_on:
      postgres:
        condition: service_healthy

  side-effect-worker:
    build: .
    command: python -m ticketflow.side_effect_worker
    environment:
      DATABASE_URL: postgresql://ticketflow:ticketflow@postgres:5432/ticketflow
      AGENT_MAX_CONCURRENT: ${AGENT_MAX_CONCURRENT:-20}
      TICKETFLOW_DB_POOL_MAX_SIZE: ${TICKETFLOW_DB_POOL_MAX_SIZE:-10}
      AGENT_SCHEDULE_TO_START_S: ${AGENT_SCHEDULE_TO_START_S:-30}
      TICKETFLOW_TRACE_EXPORTER: ${TICKETFLOW_TRACE_EXPORTER:-none}
      TICKETFLOW_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      TICKETFLOW_LANGSMITH_TRACING: ${TICKETFLOW_LANGSMITH_TRACING:-false}
      LANGSMITH_TRACING_V2: "${LANGSMITH_TRACING_V2:-false}"
      LANGCHAIN_TRACING_V2: "${LANGCHAIN_TRACING_V2:-false}"
      LANGCHAIN_TRACING: "${LANGCHAIN_TRACING:-}"
      LANGCHAIN_HANDLER: "${LANGCHAIN_HANDLER:-}"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uvicorn ticketflow.api:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://ticketflow:ticketflow@postgres:5432/ticketflow
      TICKETFLOW_DB_POOL_MAX_SIZE: ${TICKETFLOW_DB_POOL_MAX_SIZE:-10}
      AGENT_SCHEDULE_TO_START_S: ${AGENT_SCHEDULE_TO_START_S:-30}
      TICKETFLOW_TRACE_EXPORTER: ${TICKETFLOW_TRACE_EXPORTER:-none}
      TICKETFLOW_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      TICKETFLOW_LANGSMITH_TRACING: ${TICKETFLOW_LANGSMITH_TRACING:-false}
      LANGSMITH_TRACING_V2: "${LANGSMITH_TRACING_V2:-false}"
      LANGCHAIN_TRACING_V2: "${LANGCHAIN_TRACING_V2:-false}"
      LANGCHAIN_TRACING: "${LANGCHAIN_TRACING:-}"
      LANGCHAIN_HANDLER: "${LANGCHAIN_HANDLER:-}"
    depends_on:
      postgres:
        condition: service_healthy

  jaeger:
    image: jaegertracing/jaeger:2.2.0
    profiles: ["tracing"]
    ports:
      - "16686:16686"
      - "4318:4318"

volumes:
  postgres-data:
