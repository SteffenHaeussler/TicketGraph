# Full Ticketflow stack. `make stack` brings up everything; `make ticket` etc.
# work against it unchanged.
#
# How many services does a deploy actually need? The irreducible minimum is
# three: postgres (the single store — queue + LangGraph checkpointer + read
# model), api (the edge), and one worker process — a single Python process can
# host every task queue (llm_worker.py already runs two Workers in one
# asyncio.gather). We deploy four because the LLM tier is the scarce,
# rate-limited dependency: a separate worker lets it saturate, crash, and scale
# independently while tickets keep progressing. jaeger is opt-in via the
# `tracing` profile.
services:
  # Single durable store for the hand-built task queue, the LangGraph
  # checkpointer, and the read model. Replaces Temporal: enqueue + workflow
  # state commit atomically in one transaction (the outbox pattern), which a
  # separate broker couldn't give us.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow
      POSTGRES_DB: ticketflow
    ports:
      - "5432:5432"   # host access for local dev + tests
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow -d ticketflow"]
      interval: 2s
      timeout: 5s
      retries: 30

  worker:
    build: .
    command: python -m ticketflow.worker
    environment:
      DATABASE_URL: postgresql://ticketflow:ticketflow@postgres:5432/ticketflow
      # The SQLite read model is shared state between worker (writes terminal
      # results + the refund ledger) and api (reads them when the live
      # workflow query can't answer) — hence the shared volume.
      TICKETFLOW_DB_PATH: /data/ticketflow.db
      TICKETFLOW_TRACE_EXPORTER: ${TICKETFLOW_TRACE_EXPORTER:-none}
      TICKETFLOW_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    volumes:
      - ticketflow-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  llm-worker:
    build: .
    command: python -m ticketflow.llm_worker
    environment:
      DATABASE_URL: postgresql://ticketflow:ticketflow@postgres:5432/ticketflow
      MOCK_AGENT_LATENCY_MAX_S: "3"
      TICKETFLOW_TRACE_EXPORTER: ${TICKETFLOW_TRACE_EXPORTER:-none}
      TICKETFLOW_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uvicorn ticketflow.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ticketflow:ticketflow@postgres:5432/ticketflow
      TICKETFLOW_DB_PATH: /data/ticketflow.db
      TICKETFLOW_TRACE_EXPORTER: ${TICKETFLOW_TRACE_EXPORTER:-none}
      TICKETFLOW_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    volumes:
      - ticketflow-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  jaeger:
    image: jaegertracing/jaeger:2.2.0
    profiles: ["tracing"]
    ports:
      - "16686:16686" # Web UI
      - "4318:4318"   # OTLP over HTTP

volumes:
  postgres-data:
  ticketflow-data:
